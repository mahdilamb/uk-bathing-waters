name: Refresh bathing water data

on:
  schedule:
    # Every Monday at 06:00 UTC — classifications update through the swim season
    - cron: '0 6 * * 1'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch bathing water data for all UK nations
        run: |
          python3 - << 'EOF'
          import urllib.request, json, time, sys

          def fetch(url, label):
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0 (compatible; uk-bathing-waters/1.0)"})
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return json.loads(r.read())
              except Exception as e:
                  print(f"ERROR fetching {label}: {e}", file=sys.stderr)
                  sys.exit(1)

          sites = []

          # ── England: EA linked data ──────────────────────────────────────────
          print("England (EA)…", flush=True)
          url = "https://environment.data.gov.uk/doc/bathing-water.json?_pageSize=50"
          page = 0
          while url:
              data = fetch(url, f"EA page {page}")
              for item in data["result"]["items"]:
                  sp = item.get("samplingPoint", {})
                  lat, lng = sp.get("lat"), sp.get("long")
                  if not lat or not lng: continue
                  name = item.get("name", {})
                  if isinstance(name, dict): name = name.get("_value", "")
                  cls_obj = item.get("latestComplianceAssessment", {})
                  cls = "Unknown"
                  if isinstance(cls_obj, dict):
                      c = cls_obj.get("complianceClassification", {})
                      if isinstance(c, dict): cls = c.get("name", {}).get("_value", "Unknown")
                  bw_type = item.get("type", [])
                  bw_type = [t.split("/")[-1] for t in bw_type if isinstance(t, str) and "/" in t]
                  specific = [t for t in bw_type if t != "BathingWater"]
                  bw_type = specific[0] if specific else "BathingWater"
                  sites.append({"n": name, "lat": round(lat,6), "lng": round(lng,6), "c": cls, "t": bw_type, "s": "EA"})
              url = data["result"].get("next"); page += 1; time.sleep(0.3)
          print(f"  {sum(1 for s in sites if s['s']=='EA')} sites")

          # ── Wales: NRW WFS ───────────────────────────────────────────────────
          print("Wales (NRW)…", flush=True)
          wales = fetch(
              "https://datamap.gov.wales/geoserver/ows?service=WFS&version=1.0.0"
              "&request=GetFeature&typeName=inspire-nrw:Areas_Affecting_Bathing_Waters"
              "&outputFormat=application/json&srsName=EPSG:4326&maxFeatures=500",
              "NRW WFS"
          )
          seen = set()
          for f in wales["features"]:
              bw_id = f["properties"].get("bw_id", "")
              name = f["properties"].get("bw_name", "").strip()
              if bw_id in seen or not name: continue
              seen.add(bw_id)
              coords = f["geometry"]["coordinates"][0]
              lng = sum(c[0] for c in coords) / len(coords)
              lat = sum(c[1] for c in coords) / len(coords)
              sites.append({"n": name, "lat": round(lat,6), "lng": round(lng,6), "c": "Unknown", "t": "CoastalBathingWater", "s": "NRW"})
          print(f"  {sum(1 for s in sites if s['s']=='NRW')} sites")

          # ── Scotland: SEPA ArcGIS REST ───────────────────────────────────────
          print("Scotland (SEPA)…", flush=True)
          scot = fetch(
              "https://map.sepa.org.uk/server/rest/services/Open/Environmental_Monitoring"
              "/MapServer/1/query?where=1%3D1&outFields=*&outSR=4326&f=geojson",
              "SEPA"
          )
          def sepa_cls(c):
              c = (c or "").lower()
              for k in ("excellent","good","sufficient","poor"):
                  if k in c: return k.capitalize()
              return "Unknown"
          for f in scot["features"]:
              p = f["properties"]; coords = f["geometry"]["coordinates"]
              name = p.get("description","").strip()
              if not name: continue
              sites.append({"n": name, "lat": round(coords[1],6), "lng": round(coords[0],6),
                            "c": sepa_cls(p.get("class_description","")), "t": "CoastalBathingWater", "s": "SEPA"})
          print(f"  {sum(1 for s in sites if s['s']=='SEPA')} sites")

          print(f"Total: {len(sites)} sites")
          with open("sites.json", "w") as f:
              json.dump(sites, f, separators=(",", ":"))
          EOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet sites.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            COUNT=$(python3 -c "import json; d=json.load(open('sites.json')); print(len(d))")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: refresh bathing water data (${{ steps.diff.outputs.count }} sites)"
          branch: data/refresh-${{ github.run_id }}
          title: "🏖️ Refresh bathing water data — ${{ steps.diff.outputs.count }} sites"
          body: |
            Automated refresh of `sites.json` from the Environment Agency linked data API.

            - **Sites:** ${{ steps.diff.outputs.count }}
            - **Source:** https://environment.data.gov.uk/doc/bathing-water.json
            - **Triggered by:** scheduled run

            Please review any classification changes before merging.
          labels: data-refresh
          delete-branch: true
