<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Bathing Waters — Find by Travel Time</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:  #005f8e;
      --blue2: #007eb3;
      --surf:  #e8f5fb;
      --border: #dde8f0;
      --text:  #1a2832;
      --muted: #6b7f8a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f7fb;
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #004f77, var(--blue2));
      color: #fff;
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header p  { font-size: 0.82rem; opacity: .8; }

    /* ── Controls bar ── */
    .controls {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .cg { display: flex; flex-direction: column; gap: 0.3rem; }
    .cg label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
    }

    .loc-row { display: flex; gap: .4rem; }

    input[type="text"] {
      padding: .5rem .8rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: .92rem;
      width: 260px;
      outline: none;
      transition: border-color .15s;
    }
    input[type="text"]:focus { border-color: var(--blue2); }

    button {
      padding: .5rem .9rem;
      border: none;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    button:active { transform: scale(.97); }

    .btn-locate {
      background: var(--surf);
      color: var(--blue);
      border: 2px solid #b0d4e8;
    }
    .btn-locate:hover { background: #d4ecf7; }

    .btn-search {
      background: var(--blue);
      color: #fff;
      padding: .5rem 1.2rem;
    }
    .btn-search:hover { background: #004f77; }
    .btn-search:disabled { opacity: .5; cursor: default; }

    .btn-reset {
      background: #fff;
      color: var(--muted);
      border: 2px solid var(--border);
      padding: .5rem .8rem;
    }
    .btn-reset:hover { background: #fef2f2; color: #c62828; border-color: #f5c6cb; }

    /* mode pills */
    .pills { display: flex; gap: .35rem; flex-wrap: wrap; }
    .pill {
      padding: .4rem .85rem;
      border: 2px solid var(--border);
      border-radius: 20px;
      background: #fff;
      color: var(--muted);
      font-size: .86rem;
    }
    .pill.on { border-color: var(--blue); background: var(--surf); color: var(--blue); }
    .pill:disabled { opacity: .4; cursor: not-allowed; }

    /* temperature comfort pill active colours */
    .pill[data-temp="cold"].on        { border-color:#4fc3f7; background:#e1f5fe; color:#0277bd; }
    .pill[data-temp="brisk"].on       { border-color:#29b6f6; background:#e1f5fe; color:#0288d1; }
    .pill[data-temp="comfortable"].on { border-color:#26a69a; background:#e0f2f1; color:#00695c; }
    .pill[data-temp="warm"].on        { border-color:#ff7043; background:#fbe9e7; color:#bf360c; }

    /* quality-specific pill active colours */
    .pill[data-quality="Excellent"].on { border-color:#2e7d32; background:#e8f5e9; color:#2e7d32; }
    .pill[data-quality="Good"].on      { border-color:#1565c0; background:#e3f2fd; color:#1565c0; }
    .pill[data-quality="Sufficient"].on{ border-color:#e65100; background:#fff8e1; color:#e65100; }
    .pill[data-quality="Poor"].on      { border-color:#c62828; background:#fce4ec; color:#c62828; }
    .pill[data-quality="Unknown"].on   { border-color:#666;    background:#f3f3f3; color:#555;    }

    /* slider */
    .slider-row { display: flex; align-items: center; gap: .6rem; }
    input[type="range"] {
      width: 130px;
      accent-color: var(--blue);
      cursor: pointer;
    }
    .time-val {
      font-size: .95rem;
      font-weight: 700;
      color: var(--blue);
      min-width: 52px;
    }

    /* ── Main layout ── */
    .main {
      display: grid;
      grid-template-columns: 370px 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .sb-head {
      padding: .9rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: #f8fbfd;
      flex-shrink: 0;
    }
    .sb-head h2 { font-size: .97rem; }
    .sb-head p  { font-size: .78rem; color: var(--muted); margin-top: .15rem; }

    .sb-body { overflow-y: auto; flex: 1; }

    .card {
      padding: .85rem 1.25rem;
      border-bottom: 1px solid #f0f5f8;
      cursor: pointer;
      transition: background .12s;
      border-left: 3px solid transparent;
    }
    .card:hover  { background: #f5fafd; }
    .card.active { background: var(--surf); border-left-color: var(--blue); }

    .card-name { font-size: .92rem; font-weight: 600; }
    .card-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .3rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-wrap: wrap;
    }

    .badge {
      padding: .1rem .45rem;
      border-radius: 4px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .bE { background: #e8f5e9; color: #2e7d32; }
    .bG { background: #e3f2fd; color: #1565c0; }
    .bS { background: #fff8e1; color: #e65100; }
    .bP { background: #fce4ec; color: #c62828; }
    .bU { background: #f3f3f3; color: #777; }

    /* ── Map ── */
    #map { width: 100%; height: 100%; }

    /* ── States ── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 180px;
      gap: .5rem;
      color: var(--muted);
      font-size: .88rem;
    }
    .state-box span:first-child { font-size: 2rem; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #dde8f0;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Note strip ── */
    .note {
      font-size: .75rem;
      color: #7a6000;
      background: #fffce8;
      border: 1px solid #ffe082;
      border-radius: 7px;
      padding: .4rem .75rem;
      align-self: center;
    }

    @media (max-width: 700px) {
      .main { grid-template-columns: 1fr; grid-template-rows: 55% 45%; }
      .sidebar { border-right: none; border-top: 1px solid var(--border); order: 2; }
      #map { order: 1; }
      input[type="text"] { width: 190px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏖️ UK Bathing Waters</h1>
  <p>Find designated bathing sites reachable on foot, by bike or by train</p>
</header>

<div class="controls">
  <div class="cg">
    <label>Your Location</label>
    <div class="loc-row">
      <input type="text" id="locInput" placeholder="e.g. Leeds, SW1A 1AA…" />
      <button class="btn-locate" id="locateBtn">📍 Locate me</button>
    </div>
  </div>

  <div class="cg">
    <label>Travel Mode <span style="font-weight:400;text-transform:none;letter-spacing:0">(pick any)</span></label>
    <div class="pills">
      <button class="pill"     data-mode="walking">🚶 Walking</button>
      <button class="pill on"  data-mode="cycling">🚲 Cycling</button>
      <button class="pill"     data-mode="train">🚂 Train</button>
    </div>
  </div>

  <div class="cg">
    <label>Max time</label>
    <div class="slider-row">
      <input type="range" id="timeSlider" min="0.5" max="4" step="0.5" value="1.5" />
      <span class="time-val" id="timeVal">1.5 hrs</span>
    </div>
  </div>

  <div class="cg">
    <label>Water Quality <span style="font-weight:400;text-transform:none;letter-spacing:0">(pick any)</span></label>
    <div class="pills" id="qualityPills">
      <button class="pill on" data-quality="Excellent">🟢 Excellent</button>
      <button class="pill on" data-quality="Good">🔵 Good</button>
      <button class="pill on" data-quality="Sufficient">🟠 Sufficient</button>
      <button class="pill on" data-quality="Poor">🔴 Poor</button>
      <button class="pill on" data-quality="Unknown">⚪ Unknown</button>
    </div>
  </div>

  <div class="cg">
    <label>Water Temp <span style="font-weight:400;text-transform:none;letter-spacing:0">(search first)</span></label>
    <div class="pills" id="tempPills">
      <button class="pill on"  data-temp="any">Any</button>
      <button class="pill" data-temp="cold">🥶 &lt;12°C</button>
      <button class="pill" data-temp="brisk">🌊 12–16°C</button>
      <button class="pill" data-temp="comfortable">😊 16–20°C</button>
      <button class="pill" data-temp="warm">☀️ &gt;20°C</button>
    </div>
  </div>

  <button class="btn-search" id="searchBtn">Search →</button>
  <button class="btn-reset"  id="resetBtn"  title="Clear results">✕ Reset</button>
  <span class="note">🚶🚲 Road-routed via OSRM · 🚂 Live train times via Huxley2/National Rail</span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-head">
      <h2 id="resCount">Results</h2>
      <p id="resSub">Enter a location above to get started</p>
    </div>
    <div class="sb-body" id="resList">
      <div class="state-box"><span>🗺️</span><span>Search to find bathing waters</span></div>
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
// ── Map ──────────────────────────────────────────────────────────────────────
const map = L.map('map').setView([52.5, -1.8], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | Bathing water data © EA / NRW / SEPA'
}).addTo(map);

// ── Mode config ───────────────────────────────────────────────────────────────
// osrmProfile: null = crow-flies estimate only; estKmh used for buffer & fallback
const MODES = {
  walking: { label: 'Walking', emoji: '🚶', osrmProfile: 'foot',    estKmh:  5, routed: true  },
  cycling: { label: 'Cycling', emoji: '🚲', osrmProfile: 'cycling', estKmh: 13, routed: true  },
  train:   { label: 'Train',   emoji: '🚂', osrmProfile: null,      estKmh: 52, routed: true  },
};
const OSRM    = 'https://router.project-osrm.org';
const HUXLEY  = 'https://huxley2.azurewebsites.net';

// ── State ────────────────────────────────────────────────────────────────────
let allSites         = [];
let stationsData     = [];         // UK railway stations with CRS codes
let pondTemp         = null;       // Hampstead Heath pond temp from nw3weather.co.uk
let sitesReady       = false;
let userLL           = null;
let selectedModes    = new Set(['cycling']);
let selectedQualities= new Set(['Excellent','Good','Sufficient','Poor','Unknown']);
let hours            = 1.5;
let markers          = [];         // search-result markers
const trainCache     = {};         // key: "FROM:TO" → journey minutes (null = no service)
let allSiteMarkers   = [];         // background "show all" markers
let lastSearchResults= null;       // cached results pre-quality-filter
let selectedTemps = new Set(['any']); // temperature comfort filter (multi-select)

const TEMP_RANGES = {
  any:         { min: -Infinity, max: Infinity  },
  cold:        { min: -Infinity, max: 12        },
  brisk:       { min: 12,        max: 16        },
  comfortable: { min: 16,        max: 20        },
  warm:        { min: 20,        max: Infinity  },
};
let userPin          = null;
let ring             = null;
let activeCard       = null;

// ── Load bundled bathing water data ──────────────────────────────────────────
async function loadSites() {
  const res = await fetch('./sites.json');
  if (!res.ok) throw new Error('Could not load site data (' + res.status + ')');
  const raw = await res.json();
  return raw.map(s => ({ name: s.n, lat: s.lat, lng: s.lng, classification: s.c, type: s.t, src: s.s || 'EA' }));
}

// ── Railway station helpers ───────────────────────────────────────────────────
function nearestStation(ll, maxKm = 5) {
  let best = null, bestD = Infinity;
  for (const st of stationsData) {
    const d = distKm(ll, { lat: st.lat, lng: st.lng });
    if (d < bestD && d <= maxKm) { bestD = d; best = { ...st, distKm: d }; }
  }
  return best; // null if none within maxKm
}

// Parse "HH:MM" → minutes since midnight
function parseMins(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

// Huxley2: fastest journey minutes from → to (with caching).
// Returns total minutes (journey only, no station walking) or null if no service found.
async function huxleyJourneyMins(fromCRS, toCRS) {
  const key = fromCRS + ':' + toCRS;
  if (key in trainCache) return trainCache[key];

  try {
    // Step 1: get fastest service
    const r1 = await fetch(`${HUXLEY}/fastest/${fromCRS}/to/${toCRS}`, {
      headers: { Accept: 'application/json' }
    });
    if (!r1.ok) { trainCache[key] = null; return null; }
    const d1 = await r1.json();
    const deps = d1.departures || [];
    if (!deps.length || !deps[0].service) { trainCache[key] = null; return null; }

    const svc = deps[0].service;
    const stdMins = parseMins(svc.std);
    const svcId   = svc.serviceIdUrlSafe;
    if (!svcId || stdMins == null) { trainCache[key] = null; return null; }

    // Step 2: get calling points to find arrival at destination
    const r2 = await fetch(`${HUXLEY}/service/${svcId}`, {
      headers: { Accept: 'application/json' }
    });
    if (!r2.ok) { trainCache[key] = null; return null; }
    const d2 = await r2.json();

    const callingLists = d2.subsequentCallingPoints || [];
    let arrMins = null;
    for (const cl of callingLists) {
      const stops = cl.callingPoint || [];
      const stop = stops.find(s => s.crs === toCRS);
      if (stop) { arrMins = parseMins(stop.st); break; }
    }
    if (arrMins == null) { trainCache[key] = null; return null; }

    // Handle midnight wrap
    let dur = arrMins - stdMins;
    if (dur < 0) dur += 24 * 60;
    trainCache[key] = dur;
    return dur;
  } catch(e) {
    trainCache[key] = null;
    return null;
  }
}

// ── Train routing for a set of candidates ────────────────────────────────────
// Returns candidates annotated with .trainSecs (or null) and .trainNote
async function routeByTrain(origin, candidates, maxSecs, onProgress) {
  const originStn = nearestStation(origin, 3);
  if (!originStn) return candidates.map(s => ({ ...s, trainSecs: null }));

  // Walk time user → origin station (crow-flies × 1.4 factor, 5 km/h)
  const walkToStnSecs = (originStn.distKm * 1.4 / 5) * 3600;

  // For each candidate find its nearest station, then query unique pairs
  const withStns = candidates.map(site => {
    const stn = nearestStation(site, 3);
    // Walk time station → site
    const walkFromStnSecs = stn ? (distKm(site, { lat: stn.lat, lng: stn.lng }) * 1.4 / 5) * 3600 : null;
    return { ...site, destStn: stn, walkFromStnSecs };
  });

  // Unique destination CRS codes (excluding same as origin)
  const uniqueDest = [...new Set(
    withStns.filter(s => s.destStn && s.destStn.c !== originStn.c).map(s => s.destStn.c)
  )];

  // Batch Huxley2 calls (max 5 in flight at a time)
  let done = 0;
  const BATCH = 5;
  for (let i = 0; i < uniqueDest.length; i += BATCH) {
    const batch = uniqueDest.slice(i, i + BATCH);
    await Promise.all(batch.map(toCRS => huxleyJourneyMins(originStn.c, toCRS)));
    done += batch.length;
    onProgress(done, uniqueDest.length);
  }

  // Annotate candidates with total train time
  return withStns.map(site => {
    if (!site.destStn) return { ...site, trainSecs: null };
    if (site.destStn.c === originStn.c) {
      // Same station — walking only
      return { ...site, trainSecs: site.walkFromStnSecs };
    }
    const journeyMins = trainCache[originStn.c + ':' + site.destStn.c];
    if (journeyMins == null) return { ...site, trainSecs: null };
    const total = walkToStnSecs + journeyMins * 60 + (site.walkFromStnSecs || 0);
    return { ...site, trainSecs: total,
      trainNote: originStn.n + ' → ' + site.destStn.n + ' (' + journeyMins + ' min)' };
  });
}

// ── Temperature helpers ───────────────────────────────────────────────────────
function isCoastal(site) {
  return site.type !== 'InlandBathingWater' && site.type !== 'LakeBathingWater';
}

function isHampsteadPond(site) {
  const n = site.name.toLowerCase();
  return n.includes('hampstead') && n.includes('pond');
}

function tempColour(t) {
  if (t == null) return '#888';
  if (t < 12)   return '#4fc3f7';
  if (t < 16)   return '#29b6f6';
  if (t < 20)   return '#26a69a';
  return '#ff7043';
}

// ── Sea-surface temperature (Open-Meteo Marine API) ──────────────────────────
const sstCache = {};   // key: "lat1:lng1" → °C or null

async function fetchSST(lat, lng) {
  const key = lat.toFixed(1) + ':' + lng.toFixed(1);
  if (key in sstCache) return sstCache[key];
  try {
    const url = 'https://marine-api.open-meteo.com/v1/marine?latitude=' + lat +
      '&longitude=' + lng + '&current=sea_surface_temperature';
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const json = await res.json();
    const t = json?.current?.sea_surface_temperature;
    sstCache[key] = t != null ? Math.round(t * 10) / 10 : null;
  } catch(e) {
    sstCache[key] = null;
  }
  return sstCache[key];
}

// ── Batch-fetch water temperatures for search results ────────────────────────
async function batchFetchTemps(sites) {
  await Promise.all(sites.map(async site => {
    if (isHampsteadPond(site)) {
      const result = await fetchPondTemp();
      site.waterTemp = result?.temp ?? null;
    } else if (isCoastal(site)) {
      site.waterTemp = await fetchSST(site.lat, site.lng);
    } else {
      site.waterTemp = null; // inland, no data
    }
  }));
}

// ── Hampstead Heath pond temperature (nw3weather.co.uk via AllOrigins) ───────
// Cached in localStorage for 12 hours — no backend needed.
const POND_LS_KEY = 'pondTempCache';
const POND_TTL    = 12 * 3600 * 1000; // ms

// Returns { temp, readingDate: Date } or null
function parsePondHtml(html) {
  const now   = new Date();
  const month = now.getMonth() + 1; // 1–12
  const year  = now.getFullYear();
  const readings = {}; // { month: { day: temp } }

  const rowRe = /<tr[^>]*>([\s\S]*?)<\/tr>/g;
  let rm;
  while ((rm = rowRe.exec(html)) !== null) {
    const cells = [];
    const cr = /<td[^>]*>([\s\S]*?)<\/td>/g;
    let cm;
    while ((cm = cr.exec(rm[1])) !== null) {
      cells.push(cm[1].replace(/<[^>]+>/g, '').replace(/&nbsp;/g, '').trim());
    }
    if (!cells.length || !/^\d+$/.test(cells[0]) || cells.length < 13) continue;
    const day = parseInt(cells[0]);
    for (let m = 1; m <= 12; m++) {
      const v = parseFloat(cells[m]);
      if (!isNaN(v)) { (readings[m] = readings[m] || {})[day] = v; }
    }
  }

  for (const m of [month, month - 1]) {
    if (!readings[m] || !Object.keys(readings[m]).length) continue;
    const lastDay = Math.max(...Object.keys(readings[m]).map(Number));
    const temp    = readings[m][lastDay];
    // Build the actual date of the reading (handle Jan/prev-year edge case)
    const readingYear = (m < 1) ? year - 1 : year;
    const readingMonth = m < 1 ? 12 : m;
    const readingDate = new Date(readingYear, readingMonth - 1, lastDay);
    return { temp, readingDate };
  }
  return null;
}

function pondRecencyLabel(readingDate) {
  const todayStart = new Date();
  todayStart.setHours(0, 0, 0, 0);
  const readingStart = new Date(readingDate);
  readingStart.setHours(0, 0, 0, 0);
  const daysAgo = Math.round((todayStart - readingStart) / 86400000);
  if (daysAgo === 0) return 'today';
  if (daysAgo === 1) return 'yesterday';
  if (daysAgo <= 3) return daysAgo + ' days ago';
  return null; // too stale — don't show
}

let _pondInFlight = null; // deduplicate concurrent calls (e.g. batch-fetch for all 3 ponds)

async function fetchPondTemp() {
  // Return cached value if fresh (12 hrs)
  try {
    const raw = JSON.parse(localStorage.getItem(POND_LS_KEY) || 'null');
    if (raw && Date.now() - raw.ts < POND_TTL) return raw.result;
  } catch(e) {}

  // If a fetch is already in-flight, share it rather than firing 3 parallel requests
  if (_pondInFlight) return _pondInFlight;

  _pondInFlight = (async () => {
    try {
      const target = 'https://nw3weather.co.uk/wxdataday.php?vartype=pond';
      const url    = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(target);
      const res = await fetch(url);
      if (!res.ok) throw new Error(res.status);
      const parsed = parsePondHtml(await res.text());
      const result = parsed
        ? { temp: parsed.temp, readingDate: parsed.readingDate.toISOString() }
        : null;
      localStorage.setItem(POND_LS_KEY, JSON.stringify({ result, ts: Date.now() }));
      return result;
    } catch(e) {
      return null;
    } finally {
      _pondInFlight = null;
    }
  })();

  return _pondInFlight;
}

// ── Popup temperature injection (on popup open) ───────────────────────────────
map.on('popupopen', async e => {
  const marker = e.popup._source;
  if (!marker || !marker._site) return;
  const site = marker._site;

  const hasSst  = isCoastal(site) && !isHampsteadPond(site);
  const hasPond = isHampsteadPond(site);
  if (!hasSst && !hasPond) return;

  const el = e.popup.getElement()?.querySelector('.sst-val');
  if (!el) return;

  if (hasPond) {
    const result = await fetchPondTemp();
    if (!result) { el.textContent = 'n/a'; el.style.color = '#aaa'; return; }
    const label = pondRecencyLabel(new Date(result.readingDate));
    if (!label) { el.textContent = 'n/a'; el.style.color = '#aaa'; return; }
    el.textContent = result.temp + '°C (' + label + ')';
    el.style.color = tempColour(result.temp);
  } else {
    const t = await fetchSST(site.lat, site.lng);
    if (t != null) {
      el.textContent = t + '°C';
      el.style.color = tempColour(t);
    } else {
      el.textContent = 'n/a';
      el.style.color = '#aaa';
    }
  }
});

// ── Show all sites on map (background layer, no search active) ───────────────
function showAllSites() {
  allSiteMarkers.forEach(m => map.removeLayer(m));
  allSiteMarkers = [];
  const filtered = allSites.filter(s => selectedQualities.has(s.classification));
  filtered.forEach(site => {
    const mk = L.circleMarker([site.lat, site.lng], {
      radius: 5,
      color: '#fff', weight: 1.5,
      fillColor: DOT_COLOR[site.classification] || '#555',
      fillOpacity: 0.85,
    }).addTo(map).bindPopup(makePopup(site, null));
    mk._site = site;
    allSiteMarkers.push(mk);
  });
  document.getElementById('resCount').textContent = filtered.length + ' bathing sites';
  document.getElementById('resSub').textContent   =
    (selectedQualities.size < 5 ? 'Filtered · ' : '') +
    allSites.length + ' total · enter a location to filter by travel time';
  document.getElementById('resList').innerHTML =
    '<div class="state-box"><span>🗺️</span><span>Enter a location to search by travel time</span></div>';
}

// ── Geocode (Nominatim) ──────────────────────────────────────────────────────
async function geocode(q) {
  const url = 'https://nominatim.openstreetmap.org/search?q=' +
    encodeURIComponent(q) + '&countrycodes=gb&limit=1&format=json';
  const res = await fetch(url, { headers: { 'Accept-Language':'en' } });
  const json = await res.json();
  if (!json.length) throw new Error('Location "' + q + '" not found — try a town name or postcode');
  return { lat: parseFloat(json[0].lat), lng: parseFloat(json[0].lon) };
}

// ── Haversine ────────────────────────────────────────────────────────────────
function distKm(a, b) {
  const R = 6371, rad = Math.PI/180;
  const dLat = (b.lat - a.lat)*rad, dLng = (b.lng - a.lng)*rad;
  const x = Math.sin(dLat/2)**2 +
    Math.cos(a.lat*rad)*Math.cos(b.lat*rad)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// ── OSRM Table API ───────────────────────────────────────────────────────────
// Returns duration in seconds for each destination (null = unreachable).
async function osrmTimes(profile, origin, destinations) {
  const coords = [[origin.lng, origin.lat], ...destinations.map(d => [d.lng, d.lat])]
    .map(([lng, lat]) => `${lng},${lat}`)
    .join(';');
  const url = `${OSRM}/table/v1/${profile}/${coords}?sources=0&annotations=duration`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`OSRM ${profile} table failed`);
  const json = await res.json();
  if (json.code !== 'Ok') throw new Error('OSRM: ' + json.message);
  return json.durations[0].slice(1); // skip [0] which is source→source = 0
}

function fmtMins(secs) {
  if (secs == null) return '?';
  const m = Math.round(secs / 60);
  return m < 60 ? m + ' min' : Math.floor(m/60) + 'h ' + (m%60) + 'm';
}

// ── Markers ──────────────────────────────────────────────────────────────────
const DOT_COLOR = { Excellent:'#1b7e30', Good:'#1255a0', Sufficient:'#c45c00', Poor:'#b71c1c', Unknown:'#555' };

function dotIcon(c) {
  const col = DOT_COLOR[c] || '#555';
  return L.divIcon({
    html: `<div style="width:13px;height:13px;border-radius:50%;
             background:${col};border:2.5px solid #fff;
             box-shadow:0 1px 4px rgba(0,0,0,.45)"></div>`,
    className: '', iconSize:[13,13], iconAnchor:[6.5,6.5]
  });
}

function userIcon() {
  return L.divIcon({
    html: `<div style="width:17px;height:17px;border-radius:50%;
             background:#005f8e;border:3px solid #fff;
             box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,
    className:'', iconSize:[17,17], iconAnchor:[8.5,8.5]
  });
}

// ── Badge helpers ────────────────────────────────────────────────────────────
function badgeCls(c) {
  return { Excellent:'bE', Good:'bG', Sufficient:'bS', Poor:'bP' }[c] || 'bU';
}

// ── Popup HTML ────────────────────────────────────────────────────────────────
function makePopup(site, travelLine) {
  const mapsUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + site.lat + ',' + site.lng;
  const wowUrl  = 'https://www.wildopenwater.com/map?lat=' + site.lat + '&lng=' + site.lng + '&z=15';
  const showTemp = isCoastal(site) || isHampsteadPond(site);
  const tempLabel = isHampsteadPond(site) ? '🌡' : '🌊';
  const sstLine = showTemp
    ? '<br>' + tempLabel + ' <span class="sst-val" style="font-weight:600;color:#888">…</span>'
    : '';
  return '<strong>' + esc(site.name) + '</strong>' +
    '<br><span class="badge ' + badgeCls(site.classification) + '" style="display:inline-block;margin:.2rem 0">' + site.classification + '</span>' +
    (travelLine ? '<br>' + travelLine : '') +
    sstLine +
    '<br><a href="' + mapsUrl + '" target="_blank" rel="noopener" style="font-size:.82rem;color:#005f8e">🗺 Get directions</a>' +
    ' &nbsp; <a href="' + wowUrl + '" target="_blank" rel="noopener" style="font-size:.82rem;color:#1a6b3a">🏊 Wild Open Water</a>';
}

// ── Render search results (respects quality filter) ───────────────────────────
function render(sites) {
  // Hide the all-sites background layer
  allSiteMarkers.forEach(m => map.removeLayer(m));

  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (ring) { map.removeLayer(ring); ring = null; }
  activeCard = null;

  // Apply quality filter
  const qualFiltered = sites.filter(s => selectedQualities.has(s.classification));

  // Apply temperature comfort filter
  const noTemps  = qualFiltered.every(s => s.waterTemp == null);
  const tempAny  = selectedTemps.has('any');
  const visible  = (tempAny || noTemps)
    ? qualFiltered
    : qualFiltered.filter(s => {
        if (s.waterTemp == null) return false;
        return [...selectedTemps].some(k => {
          const r = TEMP_RANGES[k];
          return s.waterTemp >= r.min && s.waterTemp < r.max;
        });
      });

  const list  = document.getElementById('resList');
  const count = document.getElementById('resCount');
  const sub   = document.getElementById('resSub');

  const modeNames = [...selectedModes].map(m => MODES[m].emoji + ' ' + MODES[m].label).join(', ');
  const filteredNote = visible.length < sites.length
    ? ' (' + (sites.length - visible.length) + ' hidden by quality filter)' : '';

  if (!visible.length) {
    count.textContent = 'No results';
    sub.textContent   = sites.length
      ? 'All ' + sites.length + ' nearby sites hidden by quality filter'
      : 'Try a longer time or different mode';
    list.innerHTML    = '<div class="state-box"><span>🏜️</span><span>No sites match the quality filter</span></div>';
    return;
  }

  count.textContent = visible.length + ' site' + (visible.length !== 1 ? 's' : '') + ' found' + filteredNote;
  sub.textContent   = hours + ' hr · ' + modeNames;

  list.innerHTML = '';
  const bounds = [[userLL.lat, userLL.lng]];

  visible.forEach(site => {
    bounds.push([site.lat, site.lng]);

    const modeChips = [...selectedModes].map(mKey => {
      const cfg = MODES[mKey];
      const secs = site.modeTimes[mKey];
      return cfg.emoji + ' ' + (secs != null ? fmtMins(secs) : cfg.routed ? '—' : '~' + Math.round(site.dist / cfg.estKmh * 60) + ' min');
    }).join(' &nbsp;·&nbsp; ');

    const bestMode = [...selectedModes].reduce((best, mKey) => {
      const secs = site.modeTimes[mKey] ?? (site.dist / MODES[mKey].estKmh * 3600);
      return secs < best.secs ? { mKey, secs } : best;
    }, { mKey: null, secs: Infinity });

    const distStr = '~' + site.dist.toFixed(1) + ' km';
    const trainLine = (bestMode.mKey === 'train' && site.trainNote)
      ? '<br><small style="color:#666">🚉 ' + esc(site.trainNote) + '</small>' : '';
    const travelLine = distStr + (bestMode.mKey ? ' · ' + MODES[bestMode.mKey].emoji + ' ' + fmtMins(bestMode.secs) : '') + trainLine;

    const mk = L.marker([site.lat, site.lng], { icon: dotIcon(site.classification) })
      .addTo(map)
      .bindPopup(makePopup(site, travelLine));
    mk._site = site;
    markers.push(mk);

    const tempChip = site.waterTemp != null
      ? '<span style="color:' + tempColour(site.waterTemp) + ';font-weight:600">' +
        (isCoastal(site) ? '🌊' : '🌡') + ' ' + site.waterTemp + '°C</span>'
      : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-name">' + esc(site.name) + '</div>' +
      '<div class="card-meta">' +
        '<span class="badge ' + badgeCls(site.classification) + '">' + site.classification + '</span>' +
        (tempChip ? '<span>' + tempChip + '</span>' : '') +
        '<span>' + distStr + '</span>' +
        '<span style="margin-left:auto">' + modeChips + '</span>' +
      '</div>';

    card.addEventListener('click', () => {
      if (activeCard) activeCard.classList.remove('active');
      card.classList.add('active');
      activeCard = card;
      map.setView([site.lat, site.lng], 13, { animate: true });
      mk.openPopup();
    });
    list.appendChild(card);
  });

  map.fitBounds(bounds, { padding:[40,40], maxZoom:12 });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Search ───────────────────────────────────────────────────────────────────
async function search() {
  const raw = document.getElementById('locInput').value.trim();
  if (!raw && !userLL) { alert('Enter a location or click Locate Me first.'); return; }

  const list = document.getElementById('resList');
  const btn  = document.getElementById('searchBtn');
  btn.disabled = true;

  try {
    // Geocode text input if provided
    if (raw) {
      setStatus('Geocoding…');
      userLL = await geocode(raw);
      placeUserPin();
    }

    // Load site data once
    if (!sitesReady) {
      setStatus('Loading bathing water data…');
      allSites   = await loadSites();
      sitesReady = true;
    }

    const maxSecs = hours * 3600;

    // Buffer = largest crow-flies reach across all selected modes (×1.6 for routing detours)
    const bufferKm = Math.max(...[...selectedModes].map(m => MODES[m].estKmh * hours)) * 1.6;
    const candidates = allSites
      .map(s => ({ ...s, dist: distKm(userLL, s) }))
      .filter(s => s.dist <= bufferKm);

    const osrmModes = [...selectedModes].filter(m => MODES[m].osrmProfile);
    const trainMode = selectedModes.has('train');

    setStatus('Routing ' + [...selectedModes].map(m => MODES[m].emoji).join('') +
      ' for ' + candidates.length + ' candidates…');

    // ── OSRM (walking + cycling) in parallel ─────────────────────────────────
    const osrmResults = await Promise.all(osrmModes.map(async mKey => {
      try {
        const durations = await osrmTimes(MODES[mKey].osrmProfile, userLL, candidates);
        return { mKey, durations, ok: true };
      } catch(e) {
        console.warn('OSRM fallback for', mKey, e);
        return { mKey, durations: null, ok: false };
      }
    }));

    // ── Huxley2 train routing ─────────────────────────────────────────────────
    let trainAnnotated = candidates.map(s => ({ ...s, trainSecs: null, trainNote: null }));
    if (trainMode) {
      setStatus('🚂 Finding train times… (checking ' + candidates.length + ' sites)');
      trainAnnotated = await routeByTrain(userLL, candidates, maxSecs, (done, total) => {
        setStatus('🚂 Train routing: ' + done + '/' + total + ' station pairs…');
      });
    }

    // ── Merge into per-site modeTimes ─────────────────────────────────────────
    const withTimes = candidates.map((site, i) => {
      const modeTimes = {};

      for (const { mKey, durations, ok } of osrmResults) {
        modeTimes[mKey] = ok && durations[i] != null ? durations[i]
          : site.dist / MODES[mKey].estKmh * 3600; // crow-flies fallback
      }

      if (trainMode) {
        const ta = trainAnnotated[i];
        modeTimes.train = ta.trainSecs != null ? ta.trainSecs
          : site.dist / MODES.train.estKmh * 3600; // crow-flies fallback
      }

      const bestSecs = Math.min(...[...selectedModes].map(m =>
        modeTimes[m] != null ? modeTimes[m] : Infinity
      ));

      return { ...site, modeTimes, bestSecs,
        trainNote: trainMode ? (trainAnnotated[i].trainNote || null) : null };
    });

    const nearby = withTimes
      .filter(s => s.bestSecs <= maxSecs)
      .sort((a, b) => a.bestSecs - b.bestSecs);

    // Pre-fetch temperatures for all results (uses cache — fast on repeat searches)
    setStatus('Fetching water temperatures…');
    await batchFetchTemps(nearby);

    lastSearchResults = nearby;
    setTempPillsEnabled(true);
    render(nearby);
  } catch(e) {
    document.getElementById('resList').innerHTML =
      '<div class="state-box"><span>❌</span><span>' + esc(e.message) + '</span></div>';
    document.getElementById('resCount').textContent = 'Error';
    document.getElementById('resSub').textContent   = '';
  } finally {
    btn.disabled = false;
  }
}

function setStatus(msg) {
  document.getElementById('resList').innerHTML =
    '<div class="state-box"><div class="spinner"></div><span>' + msg + '</span></div>';
}

function placeUserPin() {
  if (userPin) map.removeLayer(userPin);
  userPin = L.marker([userLL.lat, userLL.lng], { icon: userIcon(), zIndexOffset: 1000 })
    .addTo(map).bindPopup('📍 Your location').openPopup();
  map.setView([userLL.lat, userLL.lng], 10);
}

// ── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', search);
document.getElementById('locInput').addEventListener('keydown', e => e.key==='Enter' && search());

document.getElementById('locateBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { alert('Geolocation not supported by your browser.'); return; }
  const btn = document.getElementById('locateBtn');
  btn.textContent = '⏳ Locating…';
  btn.disabled    = true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLL = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      document.getElementById('locInput').value = '';
      placeUserPin();
      btn.textContent = '📍 Locate me';
      btn.disabled    = false;
      search();
    },
    () => {
      btn.textContent = '📍 Locate me';
      btn.disabled    = false;
      alert('Could not get your location. Please enter it manually.');
    }
  );
});

document.querySelectorAll('.pill[data-mode]').forEach(p => {
  p.addEventListener('click', () => {
    const mKey = p.dataset.mode;
    if (selectedModes.has(mKey)) {
      // Don't allow deselecting the last mode
      if (selectedModes.size > 1) {
        selectedModes.delete(mKey);
        p.classList.remove('on');
      }
    } else {
      selectedModes.add(mKey);
      p.classList.add('on');
    }
  });
});

document.getElementById('timeSlider').addEventListener('input', e => {
  hours = parseFloat(e.target.value);
  document.getElementById('timeVal').textContent =
    hours + ' hr' + (hours !== 1 ? 's' : '');
});

// ── Reset ─────────────────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (ring) { map.removeLayer(ring); ring = null; }
  if (userPin) { map.removeLayer(userPin); userPin = null; }
  activeCard = null;
  userLL = null;
  lastSearchResults = null;

  document.getElementById('locInput').value = '';
  selectedTemps = new Set(['any']);
  document.getElementById('tempPills').querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('on', p.dataset.temp === 'any');
  });
  setTempPillsEnabled(false);
  map.setView([54, -3], 6);

  if (sitesReady) showAllSites();
});

// ── Quality filter pills ──────────────────────────────────────────────────────
document.getElementById('qualityPills').querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    const q = p.dataset.quality;
    if (selectedQualities.has(q)) {
      if (selectedQualities.size > 1) { selectedQualities.delete(q); p.classList.remove('on'); }
    } else {
      selectedQualities.add(q); p.classList.add('on');
    }
    if (lastSearchResults) render(lastSearchResults);
    else if (sitesReady) showAllSites();
  });
});

// ── Temperature comfort filter pills ─────────────────────────────────────────
function setTempPillsEnabled(enabled) {
  document.getElementById('tempPills').querySelectorAll('.pill').forEach(p => {
    p.disabled = !enabled;
  });
}

document.getElementById('tempPills').querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    if (p.disabled) return;
    const t = p.dataset.temp;
    if (t === 'any') {
      // "Any" clears all range selections
      selectedTemps = new Set(['any']);
    } else {
      selectedTemps.delete('any');
      if (selectedTemps.has(t)) {
        selectedTemps.delete(t);
        if (selectedTemps.size === 0) selectedTemps.add('any'); // revert if nothing left
      } else {
        selectedTemps.add(t);
      }
    }
    // Sync pill states
    document.getElementById('tempPills').querySelectorAll('.pill').forEach(x => {
      x.classList.toggle('on', selectedTemps.has(x.dataset.temp));
    });
    if (lastSearchResults) render(lastSearchResults);
  });
});

// Temp pills disabled until a search is run
setTempPillsEnabled(false);

// Pre-load sites + stations on page start
Promise.all([
  loadSites(),
  fetch('./stations.json').then(r => r.json())
]).then(([sites, stns]) => {
  allSites     = sites;
  stationsData = stns;
  sitesReady   = true;
  showAllSites();
  map.setView([54.5, -3.5], 6);
}).catch(e => console.error('Load error:', e));
</script>
